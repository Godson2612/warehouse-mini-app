<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Request Submitted</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="page-shell">
    <div class="card success-card">
      <div class="success-icon">✓</div>
      <h1>Request Submitted</h1>
      <p class="success-text">{{ confirmation_message }}</p>
      <p class="success-bp">BP Number: <strong>{{ bp_number }}</strong></p>

      {% if export_note %}
      <div class="notice-box soft">
        <p>{{ export_note }}</p>
      </div>
      {% endif %}

      <a href="{{ url_for('index') }}" class="primary-btn link-btn">Submit Another Request</a>
    </div>
  </div>
</body>
</html>
